# =====================================================================
#  Valeurs globales du déploiement CoCo
#  Toute la configuration vit ICI (esprit GitOps : config dans Git)
# =====================================================================

global:
  # Préfixe de toutes tes images sur GitHub Container Registry
  imageRegistry: ghcr.io/wassimayed
  imagePullPolicy: IfNotPresent

# ---------------------------------------------------------------------
#  Base de données MySQL (1 instance, 2 schémas)
# ---------------------------------------------------------------------
mysql:
  enabled: true
  image: mysql:8.0
  # Mot de passe root (ira dans un Secret Kubernetes, jamais en clair dans le code)
  rootPassword: "CocoRoot123"
  # Taille du disque persistant réservé pour les données
  storage: 5Gi
  port: 3306
  # Bases créées automatiquement au premier démarrage
  databases:
    - CoCoUserDB
    - CoCoCovoiturageDB
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "768Mi"
      cpu: "500m"

# ---------------------------------------------------------------------
#  Eureka — serveur de découverte des services
# ---------------------------------------------------------------------
eureka:
  enabled: true
  repository: eureka-server      # => ghcr.io/wassimayed/eureka-server
  tag: latest
  replicas: 1
  port: 6511
  resources:
    requests:
      memory: "300Mi"
      cpu: "100m"
    limits:
      memory: "600Mi"
      cpu: "500m"

# ---------------------------------------------------------------------
#  userSecurityService — authentification / utilisateurs
# ---------------------------------------------------------------------
userService:
  enabled: true
  repository: user-security-service   # => ghcr.io/wassimayed/user-security-service
  tag: latest
  replicas: 1
  port: 8090
  resources:
    requests:
      memory: "350Mi"
      cpu: "100m"
    limits:
      memory: "700Mi"
      cpu: "500m"

# ---------------------------------------------------------------------
#  covoiturageService — gestion du covoiturage
# ---------------------------------------------------------------------
covoiturageService:
  enabled: true
  repository: covoiturage-service   # => ghcr.io/wassimayed/covoiturage-service
  tag: latest
  replicas: 1
  port: 8092
  resources:
    requests:
      memory: "350Mi"
      cpu: "100m"
    limits:
      memory: "700Mi"
      cpu: "500m"

# ---------------------------------------------------------------------
#  apiGateway — porte d'entrée HTTP unique du backend
# ---------------------------------------------------------------------
apiGateway:
  enabled: true
  repository: api-gateway   # => ghcr.io/wassimayed/api-gateway
  tag: latest
  replicas: 1
  port: 9092
  resources:
    requests:
      memory: "350Mi"
      cpu: "100m"
    limits:
      memory: "700Mi"
      cpu: "500m"

# ---------------------------------------------------------------------
#  frontend — application Angular (nginx) + reverse-proxy vers le backend
# ---------------------------------------------------------------------
frontend:
  enabled: true
  repository: coco-frontend   # => ghcr.io/wassimayed/coco-frontend
  tag: latest
  replicas: 2
  port: 80
  ingress:
    className: public   # classe d'ingress de MicroK8s
    host: ""            # vide = accessible via l'IP du nœud (http://<IP-master>/)
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "300m"
