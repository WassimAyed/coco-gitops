# PIÈCE 1 — Le coffre-fort : stocke le mot de passe root de MySQL.
# Kubernetes le garde séparé du reste, encodé, et l'injecte au pod via une variable.
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  labels:
    app: mysql
type: Opaque
stringData:
  mysql-root-password: {{ .Values.mysql.rootPassword | quote }}
